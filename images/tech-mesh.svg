    <path d="M234 194L276 230"/>
    <path d="M436 206L482 206"/>
    <path d="M482 206L530 236"/>
    <path d="M276 446L360 438"/>
    <path d="M360 438L448 456"/>
    <path d="M276 230L360 438"/>
    <path d="M482 206L360 438"/>
    <path d="M234 194L360 438"/>
  </g>

  <g fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round">
    <path d="M168 616H552"/>
    <path d="M188 638H532" opacity="0.75"/>
    <path d="M220 660H500" opacity="0.5"/>
