    <rect x="182" y="516" width="112" height="10" rx="5" fill="#94A3B8" fill-opacity="0.56"/>

    <rect x="352" y="206" width="82" height="12" rx="6" fill="#14B8A6" fill-opacity="0.82"/>
    <rect x="352" y="226" width="132" height="10" rx="5" fill="#E2E8F0" fill-opacity="0.58"/>
    <rect x="352" y="244" width="98" height="10" rx="5" fill="#94A3B8" fill-opacity="0.5"/>
