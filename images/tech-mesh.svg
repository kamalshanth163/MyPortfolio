<svg width="720" height="720" viewBox="0 0 720 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Full stack technology mesh illustration</title>
  <desc id="desc">Abstract network of connected nodes and glowing rings representing modern full stack development.</desc>
  <defs>
    <linearGradient id="bgPlate" x1="74" y1="62" x2="656" y2="666" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#EEF2F7"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="108" y1="92" x2="612" y2="644" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="strokeMain" x1="126" y1="140" x2="604" y2="585" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#BFDBFE" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="orbBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(234 190) rotate(90) scale(96)">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="orbTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(496 250) rotate(90) scale(84)">
      <stop stop-color="#99F6E4"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.16"/>
    </radialGradient>
    <radialGradient id="orbSlate" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(365 438) rotate(90) scale(120)">
      <stop stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0.08"/>
    </radialGradient>
    <filter id="blurGlow" x="0" y="0" width="720" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="720" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#94A3B8" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="720" height="720" rx="48" fill="url(#bgPlate)"/>
  <circle cx="212" cy="184" r="130" fill="url(#orbBlue)" filter="url(#blurGlow)"/>
  <circle cx="500" cy="246" r="112" fill="url(#orbTeal)" filter="url(#blurGlow)"/>
  <circle cx="366" cy="454" r="152" fill="url(#orbSlate)" filter="url(#blurGlow)"/>

